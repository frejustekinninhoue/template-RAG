services:

  # ── Main application ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-true}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-prod}
      - PAGEINDEX_API_KEY=${PAGEINDEX_API_KEY:-}
      - GPTCACHE_URL=${GPTCACHE_URL:-http://gptcache:8000}
      - RIVAL_URL=${RIVAL_URL:-http://rival-service:8002}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}
      - POSTGRES_DSN=${POSTGRES_DSN:-postgresql://postgres:postgres@postgres:5432/support_bot}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - GROQ_BASE_URL=${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      - LOW_COMPLEXITY_PROVIDER=${LOW_COMPLEXITY_PROVIDER:-gemini}
      - LOW_COMPLEXITY_MODEL=${LOW_COMPLEXITY_MODEL:-gemini-2.0-flash}
      - HIGH_COMPLEXITY_PROVIDER=${HIGH_COMPLEXITY_PROVIDER:-gemini}
      - HIGH_COMPLEXITY_MODEL=${HIGH_COMPLEXITY_MODEL:-gemini-2.5-pro}
      - QUERY_INTELLIGENCE_PROVIDER=${QUERY_INTELLIGENCE_PROVIDER:-}
      - QUERY_INTELLIGENCE_MODEL=${QUERY_INTELLIGENCE_MODEL:-}
      - TREE_SEARCH_PROVIDER=${TREE_SEARCH_PROVIDER:-gemini}
      - TREE_SEARCH_MODEL=${TREE_SEARCH_MODEL:-gemini-2.0-flash}
      - COMPLETENESS_JUDGE_PROVIDER=${COMPLETENESS_JUDGE_PROVIDER:-gemini}
      - COMPLETENESS_JUDGE_MODEL=${COMPLETENESS_JUDGE_MODEL:-gemini-2.0-flash}
      - FAITHFULNESS_EVAL_ENABLED=${FAITHFULNESS_EVAL_ENABLED:-true}
      - FAITHFULNESS_JUDGE_MODEL=${FAITHFULNESS_JUDGE_MODEL:-gpt-4o-mini}
      - RETRIEVAL_DOC_IDS=${RETRIEVAL_DOC_IDS:-}
      - RETRIEVAL_DOMAINS=${RETRIEVAL_DOMAINS:-}
      - RETRIEVAL_MAX_DOCS=${RETRIEVAL_MAX_DOCS:-20}
    depends_on:
      rival-service:
        condition: service_healthy
      gptcache:
        condition: service_started
      mongodb:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Rival AI attack detection microservice ──────────────────────────────────
  rival-service:
    build:
      context: ./services/rival_service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  # ── GPTCache semantic cache server ──────────────────────────────────────────
  gptcache:
    image: zilliz/gptcache:latest
    ports:
      - "8001:8000"
    volumes:
      - gptcache_data:/data
    restart: unless-stopped

  # ── MongoDB — PageIndex document trees ─────────────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── PostgreSQL — LangGraph session checkpointer ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: support_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  mongo_data:
  pg_data:
  gptcache_data:
